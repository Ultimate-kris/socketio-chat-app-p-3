<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <link href="style.css" rel="stylesheet" />
  <body>
    <section>
      <!-- grid container -->
      <div class="container">
        <!-- 1 --(flex column container)-->
        <div class="chatContainer">
          <!-- 1.1 -->
          <div class="chatNavbar">
            <h2>
              <span class="my_big_bullet">&bull;</span> Welcome<span
                id="user_Name"
              ></span>
            </h2>
            <p id="typingStatus"></p>
          </div>
          <!-- 1.2 -->
          <div class="chatList">
            
            <!--message are coming dynamically  -->
        </div>
          <!-- 1.3 -->
          <div class="chatFooter">
            <input
              id="sendMsg"
              type="text"
              placeholder="Enter your message..."
            />
            <button id="sendBtn">Send</button>
          </div>
        </div>

        <!-- 2 -->
        <div class="connectContainer">
          <div class="connectDetails">
                          <h2 id="userCount"></h2>
            <ul id="ul">
            
            </ul>
          </div>
        </div>

        
      </div>
    </section>

    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script src="chat.js"></script>
  </body>
</html>
